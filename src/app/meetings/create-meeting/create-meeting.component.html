<div class="create-meeting">
  <mat-card>
    <mat-card-title>Create Meeting</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field class="full-width">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" />
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Start Date & Time</mat-label>
          <input matInput type="datetime-local" formControlName="startDateTime" />
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Duration (minutes)</mat-label>
          <input matInput type="number" formControlName="durationMinutes" />
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Location</mat-label>
          <input matInput formControlName="location" />
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput rows="3" formControlName="description"></textarea>
        </mat-form-field>

        <div class="participants">
          <h4>Participants</h4>
          <div *ngFor="let p of participants.controls; let i = index" class="participant-row">
            <input matInput [formControl]="participants.controls[i]" placeholder="email@example.com" />
            <button mat-icon-button color="warn" type="button" (click)="removeParticipant(i)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>

          <div class="participant-actions">
            <button mat-stroked-button type="button" (click)="addParticipant()">Add Participant</button>
          </div>
        </div>

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="isSubmitting">Create</button>
          <button mat-button type="button" routerLink="/meetings">Cancel</button>
        </div>

        <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
